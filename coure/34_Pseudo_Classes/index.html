<!DOCTYPE html> <!-- Tells the browser this page uses HTML5. -->
<html lang="en"> <!-- Starts the HTML document and sets the language to English -->
<head> <!-- Starts the head section that contains page information. -->
    <meta charset="UTF-8"> <!-- Sets the text encoding so the page supports many characters and languages. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the page responsive on phones and different screen sizes. -->
    <link rel="stylesheet" href="main.css"> <!-- Connects the page to an external CSS file called main.css. -->
    <title>Document</title> <!-- Sets the title of the page shown in the browser tab. -->
</head>
<body> <!-- Starts the body, where all visible content appears. -->
    <div class="one">Normal Element</div>
    <hr/>
    <div class="tow"></div>
    <p></p>
    <hr/> <!-- Adds a horizontal line separator. -->
    <a href="https://WWW.google.com">link 1</a> <!-- Creates a link that opens Google. -->
    <a href="https://WWW.facebook.com">link 2</a>
    <a href="https://WWW.youtube.com">link 3</a>
    <hr/>
    <form action=""> <!-- Starts a form used to send user input. -->
        <div>
            <input class="in" type="text"/> <!-- Creates a text input field with class in div. -->
        </div>
        <div>
            <input class="ch" type="checkbox"/> <!-- Creates a checkbox input with class ch. -->
            <label for="">Testing Check</label> <!-- Creates a label that describes the checkbox. -->
        </div>
    </form>
    
</body>
</html> <!-- Ends the HTML document. -->
