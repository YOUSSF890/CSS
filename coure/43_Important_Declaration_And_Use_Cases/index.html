<!DOCTYPE html> <!-- EN: HTML5 document type | AR: نوع المستند HTML5 -->

<html lang="en"> <!-- EN: start HTML and set language to English | AR: بداية الصفحة وتحديد اللغة الإنجليزية -->

<head> <!-- EN: page info (not visible) | AR: معلومات الصفحة (غير ظاهرة) -->

<meta charset="UTF-8" /> <!-- EN: support all characters | AR: دعم جميع الحروف -->

<title>CSS</title> <!-- EN: page title in browser tab | AR: عنوان الصفحة في التبويب -->

<link rel="stylesheet" href="master.css" /> <!-- EN: link external CSS file | AR: ربط ملف CSS خارجي -->

</head> <!-- EN: end head | AR: نهاية head -->

<body> <!-- EN: visible content | AR: المحتوى الظاهر -->

<div class="one" style="background-color: red;"> <!-- EN: div with class "one" and inline red background | AR: عنصر div بكلاس "one" وخلفية حمراء داخلية -->
One <!-- EN: text inside div | AR: النص داخل العنصر -->
</div> <!-- EN: end div | AR: نهاية div -->

</body> <!-- EN: end body | AR: نهاية body -->

</html> <!-- EN: end HTML document | AR: نهاية الملف -->
